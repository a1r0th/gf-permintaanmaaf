<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Untuk S 💌</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .gate-wrap {
      position: relative;
      z-index: 1;
      padding: 2rem 1.5rem;
      max-width: 420px;
    }
    .gate-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 7vw, 2.8rem);
      color: var(--pink);
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }
    .gate-title em { font-style: italic; color: var(--pink-dk); }
    .gate-sub {
      font-size: 14px;
      color: var(--text-m);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }
    .click-hint {
      font-size: 13px;
      color: var(--pink-md);
      margin-bottom: 1.25rem;
      animation: pulse-hint 1.5s ease-in-out infinite;
    }
    @keyframes pulse-hint { 0%,100%{opacity:0.6} 50%{opacity:1} }

    /* heart grid */
    .heart-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      max-width: 300px;
      margin: 0 auto 2rem;
    }
    .gate-heart {
      font-size: 2rem;
      cursor: pointer;
      transition: transform 0.15s;
      user-select: none;
      filter: grayscale(1) opacity(0.4);
      animation: float-idle 3s ease-in-out infinite;
    }
    .gate-heart:nth-child(odd)  { animation-delay: 0.3s; }
    .gate-heart:nth-child(3n)   { animation-delay: 0.6s; }
    .gate-heart.lit {
      filter: none;
      animation: pop 0.3s ease forwards, float-idle 3s ease-in-out infinite 0.3s;
    }
    @keyframes float-idle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.5)} 100%{transform:scale(1)} }

    .progress-text {
      font-size: 13px;
      color: var(--text-l);
      margin-bottom: 1.5rem;
      min-height: 20px;
      transition: color 0.3s;
    }
    .progress-text.done { color: var(--pink); font-weight: 500; }

    .enter-btn {
      display: none;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="petals-bg" id="petalsBg"></div>

  <div class="gate-wrap">
    <div class="badge">pesan rahasia untuk Chyndia Astri Virgianita Ardy 💌</div>
    <h1 class="gate-title">Halo, <em>Sindi</em>...</h1>
    <p class="gate-sub">ada seseorang yang sangat merindukanmu dan ingin minta maaf. klik semua hatinya dulu ya 🥺</p>
    <p class="click-hint">↓ klik semua hati di bawah ini ↓</p>

    <div class="heart-grid" id="heartGrid"></div>
    <p class="progress-text" id="progressText">0 / 10 hati diklik</p>
    <a href="halaman1.html" class="next-btn enter-btn" id="enterBtn">buka pesannya ❤️</a>
  </div>

  <script src="script.js"></script>
  <script>
    initPetals();

    const total = 10;
    let clicked = 0;
    const grid = document.getElementById('heartGrid');
    const prog = document.getElementById('progressText');
    const btn  = document.getElementById('enterBtn');
    const emojis = ['❤️','💕','💗','💖','💘','💝','💓','💞','💟','❣️'];

    emojis.forEach((e, i) => {
      const h = document.createElement('span');
      h.className = 'gate-heart';
      h.textContent = e;
      h.onclick = () => {
        if (h.classList.contains('lit')) return;
        h.classList.add('lit');
        clicked++;
        if (clicked < total) {
          prog.textContent = clicked + ' / ' + total + ' hati diklik';
        } else {
          prog.textContent = 'semua hati sudah diklik!! ❤️';
          prog.classList.add('done');
          btn.style.display = 'block';
        }
      };
      grid.appendChild(h);
    });
  </script>
</body>
</html>
